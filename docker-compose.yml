services:
  gateway:
    build:
      context: gateway/docker
      dockerfile: development/nginx/Dockerfile
    ports:
      - "3000:3000"
      - "8081:8081"
      - "8082:8082"
    depends_on:
      - frontend-node
      - api
      - mailer

  frontend-node:
    build:
      context: frontend/docker/development/node
    volumes:
      - ./frontend:/app
    environment:
      - WDS_SOCKET_PORT=0
      - NEXT_PUBLIC_BACKEND_URL=http://localhost:8081
      - INTERNAL_BACKEND_URL=http://api
    command: sh -c "until [ -f .ready ] ; do sleep 1 ; done && yarn dev"
    tty: true

  frontend-node-cli:
    build:
      context: frontend/docker/development/node
    volumes:
      - ./frontend:/app


  api:
    build:
      context: api/docker
      dockerfile: development/nginx/Dockerfile
    volumes:
      - ./api:/app
    depends_on:
      - api-php-fpm

  api-php-fpm:
    build:
      context: api/docker
      dockerfile: development/php-fpm/Dockerfile
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      APP_DEBUG: 1
      PHP_IDE_CONFIG: serverName=API
      SITE_URL: localhost
      SITE_NAME: Docker
      DB_HOST: api-postgres
      DB_USER: app
      DB_PASSWORD: secret
      DB_NAME: app
      MAILER_DSN: smtp://mailer:1025
      FRONTEND_URL: http://localhost:3000
      YOOKASSA_SHOP_ID: 221345
      YOOKASSA_SECRET_KEY: test_0B3flJqsbdKNA2sS2dT0ahs74LtF7fwJq2oVR-8wTCM
      MESSENGER_TRANSPORT_DSN: amqp://guest:guest@rabbitmq:5672/%2f/messages
      SENTRY_DSN: https://e7c9f4f654cfd3e17a5c986a27c5b28e@o4510080200998912.ingest.de.sentry.io/4511688220541008
      JWT_ENCRYPTION_KEY: def00000b1141e01bf480a8dfceaa59f40e92e8617c62f614b1b25ee61595fc5f012c1842737b2568102186d92267ac92ceb1e465f4c53fcff2dad1201f11d1899f00790
      JWT_PUBLIC_KEY_PATH: /run/secrets/jwt_public_key
      JWT_PRIVATE_KEY_PATH: /run/secrets/jwt_private_key
    volumes:
      - ./api:/app
    depends_on:
      - api-postgres
      - rabbitmq
    secrets:
      - jwt_public_key
      - jwt_private_key

  api-php-cli:
    build:
      context: api/docker
      dockerfile: development/php-cli/Dockerfile
    volumes:
      - ./api:/app
    environment:
      APP_DEBUG: 1
      SITE_URL: localhost
      SITE_NAME: Docker
      DB_HOST: api-postgres
      DB_USER: app
      DB_PASSWORD: secret
      DB_NAME: app
      MAILER_DSN: smtp://mailer:1025
      MAILER_FROM_EMAIL: admin@site.ru
      MAILER_FROM_NAME: admin
      FRONTEND_URL: http://localhost:3000
      YOOKASSA_SHOP_ID: 221345
      YOOKASSA_SECRET_KEY: test_0B3flJqsbdKNA2sS2dT0ahs74LtF7fwJq2oVR-8wTCM
      MESSENGER_TRANSPORT_DSN: amqp://guest:guest@rabbitmq:5672/%2f/messages
      SENTRY_DSN: https://e7c9f4f654cfd3e17a5c986a27c5b28e@o4510080200998912.ingest.de.sentry.io/4511688220541008
      JWT_ENCRYPTION_KEY: def00000b1141e01bf480a8dfceaa59f40e92e8617c62f614b1b25ee61595fc5f012c1842737b2568102186d92267ac92ceb1e465f4c53fcff2dad1201f11d1899f00790
      JWT_PUBLIC_KEY_PATH: /run/secrets/jwt_public_key
      JWT_PRIVATE_KEY_PATH: /run/secrets/jwt_private_key
    depends_on:
        api-postgres:
          condition: service_started
        rabbitmq:
            condition: service_healthy
    secrets:
      - jwt_public_key
      - jwt_private_key

  api-postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: app
    volumes:
      - api-postgres:/var/lib/postgresql
    ports:
      - "54321:5432"

  mailer:
    image: mailhog/mailhog

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "-q", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: always

  api-php-worker:
    build:
      context: api/docker
      dockerfile: development/php-cli/Dockerfile
    volumes:
      - ./api:/app
    environment:
      APP_DEBUG: 1
      SITE_URL: localhost
      SITE_NAME: Docker
      DB_HOST: api-postgres
      DB_USER: app
      DB_PASSWORD: secret
      DB_NAME: app
      MAILER_DSN: smtp://mailer:1025
      MAILER_FROM_EMAIL: admin@site.ru
      MAILER_FROM_NAME: admin
      FRONTEND_URL: http://localhost:3000
      YOOKASSA_SHOP_ID: 221345
      YOOKASSA_SECRET_KEY: test_0B3flJqsbdKNA2sS2dT0ahs74LtF7fwJq2oVR-8wTCM
      MESSENGER_TRANSPORT_DSN: amqp://guest:guest@rabbitmq:5672/%2f/messages
      SENTRY_DSN: https://e7c9f4f654cfd3e17a5c986a27c5b28e@o4510080200998912.ingest.de.sentry.io/4511688220541008
      JWT_ENCRYPTION_KEY: def00000b1141e01bf480a8dfceaa59f40e92e8617c62f614b1b25ee61595fc5f012c1842737b2568102186d92267ac92ceb1e465f4c53fcff2dad1201f11d1899f00790
      JWT_PUBLIC_KEY_PATH: /run/secrets/jwt_public_key
      JWT_PRIVATE_KEY_PATH: /run/secrets/jwt_private_key
    command: php bin/console messenger:consume async --limit=1000 --memory-limit=128M -vv
    restart: always
    depends_on:
      - api-postgres
      - rabbitmq

secrets:
  jwt_public_key:
    file: ./docker/development/secrets/jwt_public.key
  jwt_private_key:
    file: ./docker/development/secrets/jwt_private.key


volumes:
  api-postgres:
  rabbitmq_data: