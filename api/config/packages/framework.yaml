# see https://symfony.com/doc/current/reference/configuration/framework.html
framework:
    secret: '%env(APP_SECRET)%'

    # Note that the session will be started ONLY if you read or write from it.
    session: true
    trusted_proxies: '127.0.0.1,REMOTE_ADDR,172.16.0.0/12'
    trusted_headers: [ 'x-forwarded-for', 'x-forwarded-proto' ]
    #esi: true
    #fragments: true
    http_client:
        scoped_clients:
            dadata.client:
                scope: 'https://suggestions\.dadata\.ru/suggestions/api/4_1/rs/'
                base_uri: 'https://suggestions.dadata.ru/suggestions/api/4_1/rs/'
                headers:
                    'Authorization': 'Token %env(DADATA_API_KEY)%'
                    'Accept': 'application/json'

when@test:
    framework:
        test: true
        session:
            storage_factory_id: session.storage.factory.mock_file
